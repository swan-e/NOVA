services:

  # ── MCP Server ─────────────────────────────────────────────────────────────
  # Always-on. Claude Code connects to this via .mcp.json.
  mcp:
    build:
      context: .
    container_name: nova-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OBSIDIAN_VAULT_INTERNAL=/obsidian
    volumes:
      # Obsidian vault — path set in .env, mapped to fixed internal path.
      # To migrate to home server: update OBSIDIAN_VAULT_PATH in .env only.
      - ${OBSIDIAN_VAULT_PATH}:/obsidian:rw
      # Live build mount — npm run build locally updates this instantly.
      # No image rebuild needed for code changes.
      - ./build:/app/build:ro
      - ./receipts:/app/receipts:rw

    working_dir: /app
    stdin_open: true
    tty: true
    command: ["node", "build/index.js"]