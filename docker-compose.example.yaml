# docker-compose.example.yml
#
# Reference configuration for running Nova MCP locally without the
# receipt upload server or Cloudflare Tunnel.
#
# This is the minimal setup — MCP + scripts + ofelia.
# Copy to docker-compose.yml and fill in your .env to get started.
#
# For receipt upload support (phone → receipts folder), see SETUP.md §5.

services:

  # ── MCP Server ─────────────────────────────────────────────────────────────
  # Spin up when working with Claude Code, down when not needed.
  # Claude Code connects to this via .mcp.json on your local machine.
  mcp:
    build:
      context: .
    container_name: nova-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OBSIDIAN_VAULT_INTERNAL=/obsidian
    volumes:
      # Obsidian vault — update OBSIDIAN_VAULT_PATH in .env to your vault location
      - ${OBSIDIAN_VAULT_PATH}:/obsidian:rw
      # Live build mount — run `npm run build` locally, restart picks up changes instantly
      - ./build:/app/build:ro
      # Receipts inbox — drop files here for finance tool to process
      - ./receipts:/app/receipts:rw
    working_dir: /app
    stdin_open: true
    tty: true
    command: ["node", "build/index.js"]

  # ── Scripts (cron target) ──────────────────────────────────────────────────
  # Always-on. Ofelia exec's into this container on schedule.
  # Keeps running even when MCP is stopped.
  scripts:
    build:
      context: .
    container_name: nova-mcp-scripts
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OBSIDIAN_VAULT_INTERNAL=/obsidian
    volumes:
      - ${OBSIDIAN_VAULT_PATH}:/obsidian:rw
      - ./build:/app/build:ro
      - ./receipts:/app/receipts:rw
    working_dir: /app
    # Keeps container alive between cron runs
    command: ["node", "-e", "setInterval(() => {}, 1 << 30)"]
    labels:
      ofelia.enabled: "true"

      # ── Morning briefing: 7:00am daily ───────────────────────────────────
      # Creates Daily Briefings/YYYY-MM-DD.md in Obsidian with
      # today's calendar events + Notion tasks
      ofelia.job-exec.morning-briefing.schedule:   "0 0 7 * * *"
      ofelia.job-exec.morning-briefing.command:    "node build/scripts/morning-briefing.js"
      ofelia.job-exec.morning-briefing.no-overlap: "true"

      # ── Daily email summary: 3x per day ──────────────────────────────────
      # 8am  → creates note + Morning section
      # 12pm → appends Afternoon section
      # 4pm  → appends Evening section
      ofelia.job-exec.email-morning.schedule:      "0 0 8  * * *"
      ofelia.job-exec.email-morning.command:       "node build/scripts/daily-email-summary.js"
      ofelia.job-exec.email-morning.no-overlap:    "true"

      ofelia.job-exec.email-afternoon.schedule:    "0 0 12 * * *"
      ofelia.job-exec.email-afternoon.command:     "node build/scripts/daily-email-summary.js"
      ofelia.job-exec.email-afternoon.no-overlap:  "true"

      ofelia.job-exec.email-evening.schedule:      "0 0 16 * * *"
      ofelia.job-exec.email-evening.command:       "node build/scripts/daily-email-summary.js"
      ofelia.job-exec.email-evening.no-overlap:    "true"

      # ── Weekly review: every Sunday at 7:00am ────────────────────────────
      ofelia.job-exec.weekly_review.schedule:      "0 0 7 * * SUN"
      ofelia.job-exec.weekly_review.command:       "node build/scripts/weekly-review.js"
      ofelia.job-exec.weekly_review.no-overlap:    "true"

      # ── Calendar reminder: every Sunday at 8:00am ────────────────────────
      ofelia.job-exec.calendar_reminder.schedule:  "0 0 8 * * SUN"
      ofelia.job-exec.calendar_reminder.command:   "node build/scripts/calendar-reminder.js"
      ofelia.job-exec.calendar_reminder.no-overlap: "true"

  # ── Ofelia Scheduler ───────────────────────────────────────────────────────
  # Watches Docker labels on the scripts container and runs jobs on schedule.
  # Requires access to Docker socket — never expose this container externally.
  ofelia:
    image: mcuadros/ofelia:latest
    container_name: nova-mcp-ofelia
    restart: unless-stopped
    depends_on:
      - scripts
    command: daemon --docker
    environment:
      - TZ=America/New_York   # update to your timezone
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro