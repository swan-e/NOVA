services:

  # ── Receipt Upload Server ──────────────────────────────────────────────────
  # Accepts photo/PDF uploads from phone via POST /upload.
  # Saves to /app/receipts — no AI, no tokens.
  # Baked image pattern — no volume mounts on Railway.
  upload:
    build:
      context: .
      dockerfile: Dockerfile.upload
    container_name: nova-mcp-upload
    restart: unless-stopped
    environment:
      - UPLOAD_SECRET_KEY=${UPLOAD_SECRET_KEY}
      - UPLOAD_PORT=4000
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout:  5s
      retries:  3

  # ── Cloudflare Tunnel ──────────────────────────────────────────────────────
  # Routes https://receipts.firstlast.dev → upload:4000
  # Your phone hits the public URL — Railway internal network handles routing.
  cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: nova-mcp-cloudflare
    restart: unless-stopped
    depends_on:
      upload:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}